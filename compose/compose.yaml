services:
  llama-stack:
    image: ${LLAMA_STACK_IMAGE}
    ports:
      - "8321:8321"
    env_file:
      - ../env/values.env
    environment:
      RUN_CONFIG_PATH: /app-root/run-no-guard.yaml
    volumes:
      - ../llama-stack-configs/run.yaml:/app-root/run.yaml:ro
      - ../llama-stack-configs/run-no-guard.yaml:/app-root/run-no-guard.yaml:ro
      - ../rag-content:/rag-content
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8321/v1/health | grep -q '\"status\":\"OK\"'",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  lightspeed-core:
    image: ${LIGHTSPEED_CORE_IMAGE}
    depends_on:
      llama-stack:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./lightspeed-stack.compose.yaml:/app-root/lightspeed-stack.yaml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/readiness",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
