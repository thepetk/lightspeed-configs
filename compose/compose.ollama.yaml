services:
  llama-stack:
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      RUN_CONFIG_PATH: /app-root/run.yaml

  ollama:
    image: ${OLLAMA_IMAGE}
    env_file:
      - ../env/values.env
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -e
        MODEL="${SAFETY_MODEL:-llama-guard3:8b}"
        ollama serve &
        OLLAMA_PID=$$!
        until ollama list >/dev/null 2>&1; do
          sleep 1
        done
        ollama pull "$${MODEL}"
        wait "$${OLLAMA_PID}"
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "MODEL=\"$${SAFETY_MODEL:-llama-guard3:8b}\"; ollama list | grep -q \"$${MODEL}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

volumes:
  ollama-data:
