name: Validation Checks

on:
  pull_request:
    branches:
      - main
      - rhdh-*

jobs:
  validate-yaml:
      runs-on: ubuntu-latest
      permissions:
        contents: read
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Use Node.js and cache dependencies
          uses: actions/setup-node@v4
          with:
            node-version: '22.21'
            cache: 'yarn'
        - name: Install dependencies
          run: yarn install --immutable --frozen-lockfile
        - name: Validate YAML files
          run: make validate-yaml

  validate-configs:
      runs-on: ubuntu-latest
      permissions:
        contents: read
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Install yq
          run: |
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
        - name: Validate image sync
          run: bash scripts/validate-images.sh
        - name: Validate compose config sync
          run: bash scripts/validate-compose-config.sh