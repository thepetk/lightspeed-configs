name: Smoke Tests

on:
  pull_request:
    branches:
      - main
      - rhdh-*

jobs:
  compose-smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create env/values.env
        run: cp env/default-values.env env/values.env

      - name: Fetch RAG content
        run: make get-rag CONTAINER_ENGINE=docker

      - name: Start services
        run: docker compose --env-file env/default-values.env -f compose/compose.yaml up -d --wait --wait-timeout 120

      - name: Verify llama-stack models
        run: |
          response=$(curl -fsS http://localhost:8321/v1/models)
          echo "llama-stack models: $response"
          echo "$response" | grep -q 'sentence-transformers'

      - name: Verify lightspeed-core models
        run: |
          response=$(curl -fsS http://localhost:8080/v1/models)
          echo "lightspeed-core models: $response"
          echo "$response" | grep -q 'sentence-transformers'

      - name: Collect logs on failure
        if: failure()
        run: docker compose --env-file env/default-values.env -f compose/compose.yaml logs

      - name: Teardown services
        if: always()
        run: docker compose --env-file env/default-values.env -f compose/compose.yaml down
